<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chrysalis · Sync History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* canvas + surfaces */
      --canvas: #faf8f4;
      --canvas-2: #f3f1ea;
      --card: #ffffff;
      --line: #e6e2d8;
      --line-strong: #d8d3c6;

      /* ink / text */
      --ink: #16150f;
      --ink-2: #56524a;
      --ink-3: #8a857a;

      /* semantic state */
      --good: #0f8f63;
      --good-bg: #e7f4ee;
      --good-line: #bfe3d3;
      --yellow: #b45309;

      /* shadows + radii */
      --shadow-sm: 0 1px 2px rgba(28,25,15,.05), 0 1px 1px rgba(28,25,15,.04);
      --shadow-md: 0 6px 16px -6px rgba(28,25,15,.12), 0 2px 6px -2px rgba(28,25,15,.08);
      --r-lg: 20px; --r-md: 14px; --r-sm: 10px;

      /* legacy aliases */
      --bg: var(--card);
      --surface: var(--card);
      --border: var(--line);
      --text: var(--ink);
      --muted: var(--ink-2);
      --accent: var(--ink);
      --monarch-blue: #2f6bff;
      --green: var(--good);
      --red: #dc2626;
    }
    * { box-sizing: border-box; }
    html {
      background:
        radial-gradient(1200px 600px at 80% -10%, #fbf6ee 0%, transparent 60%),
        radial-gradient(900px 500px at -10% 10%, #f8f6ef 0%, transparent 55%),
        var(--canvas);
      min-height: 100%;
    }
    body {
      margin: 0 auto;
      font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      background: transparent;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      padding: 24px;
      max-width: 720px;
    }
    .nav {
      margin-bottom: 20px;
      font-size: 13px;
    }
    .nav a {
      color: var(--accent);
      text-decoration: none;
    }
    .nav a:hover { text-decoration: underline; }
    h1 { font-family: 'Fraunces', Georgia, serif; font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 8px 0; color: var(--ink); }
    .sub { font-size: 13px; color: var(--ink-2); margin-bottom: 20px; }
    .list { display: flex; flex-direction: column; gap: 0; border-radius: var(--r-md); box-shadow: var(--shadow-sm); }
    .list-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-bottom: none;
      cursor: pointer;
      background: var(--bg);
      text-decoration: none;
      color: inherit;
      font: inherit;
      text-align: left;
      width: 100%;
    }
    .list-row:first-child { border-radius: 10px 10px 0 0; }
    .list-row:last-child { border-bottom: 1px solid var(--border); border-radius: 0 0 10px 10px; }
    .list-row:hover { background: var(--canvas-2); }
    .list-row .time { color: var(--ink-2); font-size: 13px; flex-shrink: 0; margin-left: 12px; }
    .list-row .summary { font-weight: 500; }
    .list-row .summary.ok { color: var(--green); }
    .list-row .summary.fail { color: var(--red); }
    .list-row .summary.warn { color: var(--yellow); }
    .detail-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .detail-header .date { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .result-list { margin-top: 16px; }
    .result-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      border-radius: var(--r-sm);
      margin-bottom: 8px;
    }
    .result-row.success { background: var(--good-bg); border-color: var(--good-line); }
    .result-row.fail { background: #fef2f2; border-color: #fecaca; }
    .result-icon { font-weight: 700; flex-shrink: 0; }
    .result-row.success .result-icon { color: var(--green); }
    .result-row.fail .result-icon { color: var(--red); }
    .result-body { flex: 1; min-width: 0; }
    .result-pl-name { font-weight: 600; }
    .result-detail { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .result-balance { font-weight: 600; flex-shrink: 0; }
    .result-balance.positive { color: var(--green); }
    .result-balance.negative { color: var(--red); }
    .sync-details-section { margin-top: 20px; padding: 14px; background: var(--card); border: 1px solid var(--line); box-shadow: var(--shadow-sm); border-radius: var(--r-md); font-size: 12px; }
    .sync-details-section h3 { margin: 0 0 10px 0; font-size: 13px; color: var(--ink); }
    .sync-details-table { width: 100%; border-collapse: collapse; font-size: 11px; font-variant-numeric: tabular-nums; }
    .sync-details-table th { text-align: left; padding: 6px 8px 6px 0; border-bottom: 1px solid var(--line); color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; }
    .sync-details-table td { padding: 6px 8px 6px 0; border-bottom: 1px solid var(--line); }
    .sync-details-table tr.success td:last-child { color: var(--good); }
    .sync-details-table tr.fail td:last-child { color: var(--red); }
    .empty { color: var(--ink-2); padding: 24px; text-align: center; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="sync-history.js"></script>
</body>
</html>
